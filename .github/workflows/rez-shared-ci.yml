name: Shared Package CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
    paths: ['rez-shared/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rez-shared/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: rez-shared
      - name: Type check
        run: npx tsc --noEmit
        working-directory: rez-shared
        continue-on-error: true
      - name: Lint
        run: npm run lint
        working-directory: rez-shared
        continue-on-error: true
      - name: Build
        run: npm run build
        working-directory: rez-shared

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: rez-shared
        continue-on-error: true
