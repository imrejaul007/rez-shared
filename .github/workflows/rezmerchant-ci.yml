name: REZ Merchant App CI

on:
  push:
    paths:
      - 'rezmerchant/**'
    branches: [main, develop]
  pull_request:
    paths:
      - 'rezmerchant/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rezmerchant/rez-merchant-master
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rezmerchant/rez-merchant-master/package-lock.json
      - run: npm ci
      - name: Run tests
        run: npm test -- --passWithNoTests --ci --forceExit
        env:
          NODE_ENV: test
          CI: true
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true
