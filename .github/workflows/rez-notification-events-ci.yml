name: REZ Notification Events CI

on:
  push:
    paths:
      - 'rez-notification-events/**'
    branches: [main, develop]
  pull_request:
    paths:
      - 'rez-notification-events/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rez-notification-events
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rez-notification-events/package-lock.json
      - run: npm ci
      - name: Type check / lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true
