name: REZ Now CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
    paths: ['rez-now/**', 'rez-shared/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rez-now/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: rez-now
      - name: Type check
        run: npx tsc --noEmit
        working-directory: rez-now
        continue-on-error: true
      - name: Lint
        run: npm run lint
        working-directory: rez-now
        continue-on-error: true
      - name: Run unit tests
        run: npm test -- --passWithNoTests
        working-directory: rez-now
        env:
          NODE_ENV: test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rez-now-coverage
          path: rez-now/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rez-now/package-lock.json
      - name: Install and build
        run: npm ci && npm run build
        working-directory: rez-now

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: rez-now
        continue-on-error: true
