name: Publish to npm

on:
  push:
    branches: [main]
    paths: ['packages/rez-shared/**']

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci
        working-directory: packages/rez-shared

      - name: Build
        run: npm run build
        working-directory: packages/rez-shared

      - name: Publish
        run: npm publish
        working-directory: packages/rez-shared
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
