name: Marketing Service CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
    paths: ['rez-marketing-service/**', 'rez-shared/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rez-marketing-service/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: rez-marketing-service
      - name: Type check
        run: npx tsc --noEmit
        working-directory: rez-marketing-service
        continue-on-error: true
      - name: Lint
        run: npm run lint
        working-directory: rez-marketing-service
        continue-on-error: true
      - name: Format check
        run: npm run format -- --check
        working-directory: rez-marketing-service
        continue-on-error: true
      - name: Build
        run: npm run build
        working-directory: rez-marketing-service

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: rez-marketing-service
        continue-on-error: true
